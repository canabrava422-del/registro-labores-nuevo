<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#051F52"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RegCampo"/>
<meta name="app-version" content="1.0.0"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-any-192.png"/>
<title>Registro de Labores de Campo</title>
<style>
  :root{
    --azul-oscuro:#051F52; --azul:#0C4A8C; --verde:#2EA043; --verde-claro:#9be3ac;
    --verde-menta:#eafaf0; --fondo:#f4f6fb; --borde:#dfe4ee; --texto:#1c2536; --texto-suave:#6b7588;
    --radio:14px; --radio-sm:10px; --rojo:#d64545; --naranja:#e67e22;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--fondo);color:var(--texto);padding-bottom:env(safe-area-inset-bottom);}
  header{background:var(--azul-oscuro);color:#fff;padding:16px 18px calc(16px + env(safe-area-inset-top)) 18px;padding-top:calc(16px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
  header h1{font-size:1.05rem;margin:0;font-weight:700;}
  header .user-pill{font-size:0.75rem;background:rgba(255,255,255,0.14);padding:6px 12px;border-radius:999px;display:flex;align-items:center;gap:8px;}
  main{max-width:560px;margin:0 auto;padding:16px;}
  .hidden{display:none !important;}

  /* Login */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:18px;padding:24px;}
  .login-card{background:#fff;border-radius:var(--radio);padding:28px 22px;width:100%;max-width:340px;box-shadow:0 8px 30px rgba(5,31,82,0.12);text-align:center;}
  .login-card h2{margin:0 0 4px;color:var(--azul-oscuro);}
  .login-card p{color:var(--texto-suave);font-size:0.85rem;margin:0 0 18px;}
  select, input, textarea{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:var(--radio-sm);font-size:0.95rem;background:#fff;color:var(--texto);font-family:inherit;}
  textarea{min-height:70px;resize:vertical;}
  .btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--radio-sm);background:var(--verde);color:#fff;font-weight:700;font-size:0.95rem;cursor:pointer;margin-top:14px;}
  .btn:active{opacity:0.85;}
  .btn.secundario{background:var(--azul);}
  .btn.peligro{background:var(--rojo);}
  .pin-dots{display:flex;justify-content:center;gap:10px;margin:14px 0;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--borde);}
  .pin-dot.filled{background:var(--verde);border-color:var(--verde);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
  .keypad button{padding:16px;font-size:1.2rem;border:1.5px solid var(--borde);border-radius:var(--radio-sm);background:#fff;font-weight:700;color:var(--azul-oscuro);}

  /* Labores grid */
  .labor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .labor-card{background:#fff;border:1.5px solid var(--borde);border-radius:var(--radio);padding:16px 10px;text-align:center;cursor:pointer;}
  .labor-card .emoji{font-size:1.6rem;display:block;margin-bottom:6px;}
  .labor-card .lc-name{font-size:0.78rem;font-weight:700;color:var(--azul-oscuro);}
  .labor-card:active{background:var(--verde-menta);border-color:var(--verde-claro);}

  /* Form */
  .form-card{background:#fff;border-radius:var(--radio);padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(5,31,82,0.06);}
  .section-title{font-weight:700;color:var(--azul-oscuro);font-size:0.9rem;margin-bottom:12px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-field{display:flex;flex-direction:column;gap:5px;}
  .form-field.full{grid-column:1 / -1;}
  .form-field label{font-size:0.72rem;font-weight:700;color:var(--texto-suave);text-transform:uppercase;letter-spacing:0.02em;}
  .ratio-display{padding:11px 14px;border:1.5px solid var(--borde);border-radius:var(--radio-sm);background:var(--verde-menta);color:var(--azul-oscuro);font-weight:700;}
  .topbar-form{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .back-btn{background:#fff;border:1.5px solid var(--borde);border-radius:var(--radio-sm);padding:9px 13px;font-weight:700;color:var(--azul-oscuro);}
  .topbar-form h2{font-size:1rem;margin:0;color:var(--azul-oscuro);}

  /* Lista de registros */
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:var(--radio-sm);background:#fff;border:1.5px solid var(--borde);font-weight:700;font-size:0.82rem;color:var(--texto-suave);cursor:pointer;}
  .tab.active{background:var(--azul-oscuro);color:#fff;border-color:var(--azul-oscuro);}
  .record-card{background:#fff;border-left:5px solid var(--azul);border-radius:var(--radio-sm);padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(5,31,82,0.06);}
  .record-card .rc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .record-card .rc-labor{font-weight:700;font-size:0.88rem;color:var(--azul-oscuro);}
  .record-card .rc-fecha{font-size:0.72rem;color:var(--texto-suave);}
  .record-card .rc-meta{font-size:0.78rem;color:var(--texto-suave);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--texto-suave);}

  nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borde);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:30;}
  nav.bottom-nav button{flex:1;border:none;background:none;padding:11px 0 9px;font-size:0.68rem;font-weight:700;color:var(--texto-suave);display:flex;flex-direction:column;align-items:center;gap:3px;}
  nav.bottom-nav button.active{color:var(--verde);}
  nav.bottom-nav .nav-emoji{font-size:1.2rem;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--azul-oscuro);color:#fff;padding:11px 20px;border-radius:999px;font-size:0.85rem;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
  .toast.error{background:var(--rojo);}
  main{padding-bottom:90px;}
</style>
</head>
<body>

<header>
  <h1>🌾 Registro de Labores <span style="font-size:0.6rem;background:#e67e22;padding:2px 8px;border-radius:999px;vertical-align:middle;">DEMO</span></h1>
  <div class="user-pill hidden" id="user-pill">
    <span id="user-pill-name">—</span>
    <span onclick="cerrarSesion()" style="cursor:pointer;">⏻</span>
  </div>
</header>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-wrap">
    <div class="login-card">
      <h2>Ingresar</h2>
      <p>Selecciona tu nombre e ingresa tu PIN</p>
      <p style="color:#e67e22;font-weight:700;margin-top:-10px;">Modo demo: PIN = 1234</p>
      <div class="form-field" style="margin-bottom:10px;">
        <select id="login-controlador"><option value="">— Cargando controladores... —</option></select>
      </div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="keypad" id="keypad"></div>
    </div>
  </div>
</div>

<main id="app-main" class="hidden">

  <!-- HOME: selección de labor -->
  <section id="view-home">
    <p style="font-weight:700;color:var(--azul-oscuro);margin:4px 0 12px;">¿Qué labor vas a registrar?</p>
    <div class="labor-grid" id="labor-grid"></div>
  </section>

  <!-- FORM -->
  <section id="view-form" class="hidden">
    <div class="topbar-form">
      <button class="back-btn" onclick="volverHome()">← Volver</button>
      <h2 id="form-title">Labor</h2>
    </div>
    <div id="form-container"></div>
    <button class="btn" onclick="guardarLabor()">💾 Guardar registro</button>
  </section>

  <!-- LISTA -->
  <section id="view-lista" class="hidden">
    <div class="tabs">
      <div class="tab active" id="tab-hoy" onclick="cambiarFiltro('hoy')">Hoy</div>
      <div class="tab" id="tab-semana" onclick="cambiarFiltro('semana')">Esta semana</div>
      <div class="tab" id="tab-todos" onclick="cambiarFiltro('todos')">Todos</div>
    </div>
    <div id="lista-registros"></div>
  </section>

</main>

<nav class="bottom-nav hidden" id="bottom-nav">
  <button class="active" id="nav-home" onclick="irHome()"><span class="nav-emoji">📝</span>Registrar</button>
  <button id="nav-lista" onclick="irLista()"><span class="nav-emoji">📋</span>Mis registros</button>
</nav>

<script>
// Versión DEMO — sin conexión real a Supabase, datos guardados solo en este celular.
// ============================================================
// CONFIGURA AQUÍ TU PROYECTO SUPABASE
// ============================================================
// ============================================================
// MODO DEMO: esta versión NO usa Supabase, guarda todo en el
// celular (localStorage) para que puedas probar el flujo completo
// sin necesidad de configurar la base de datos todavía.
// PIN de prueba para cualquier controlador: 1234
// ============================================================
const DEMO_CONTROLADORES = [
  { id:'1', nombre:'Jesus Saldarriaga', pin:'1234', activo:true },
  { id:'2', nombre:'Christian Soto', pin:'1234', activo:true },
  { id:'3', nombre:'Henry Chulle', pin:'1234', activo:true },
  { id:'4', nombre:'Dani Coronado', pin:'1234', activo:true },
  { id:'5', nombre:'Julio Acaro', pin:'1234', activo:true },
  { id:'6', nombre:'Luis Carrasco', pin:'1234', activo:true },
];

function leerLaboresDemo(){
  return JSON.parse(localStorage.getItem('rc_demo_labores') || '[]');
}
function guardarLaboresDemo(arr){
  localStorage.setItem('rc_demo_labores', JSON.stringify(arr));
}

const sb = {
  from(tabla){
    if (tabla === 'controladores'){
      return {
        select(){ return this; },
        eq(){ return this; },
        order(){ return Promise.resolve({ data: DEMO_CONTROLADORES, error: null }); },
      };
    }
    if (tabla === 'labores'){
      return {
        insert(registro){
          const arr = leerLaboresDemo();
          arr.unshift({ ...registro, id: Date.now().toString(), created_at: new Date().toISOString() });
          guardarLaboresDemo(arr);
          return Promise.resolve({ error: null });
        },
        select(){
          this._filtros = [];
          return this;
        },
        eq(campo, valor){ this._filtros.push(r => r[campo] === valor); return this; },
        gte(campo, valor){ this._filtros.push(r => r[campo] >= valor); return this; },
        order(){ return this; },
        limit(n){
          let arr = leerLaboresDemo();
          (this._filtros || []).forEach(f => { arr = arr.filter(f); });
          arr = arr.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, n);
          return Promise.resolve({ data: arr, error: null });
        },
      };
    }
    return { select(){ return Promise.resolve({ data: [], error: null }); } };
  }
};

// ============================================================
// DEFINICIÓN DE LABORES Y FORMULARIOS
// ============================================================
const LABORES = [
  { id:'aplicacion', emoji:'🧪', nombre:'Aplicación' },
  { id:'limpieza',   emoji:'🧹', nombre:'Limpieza de laterales' },
  { id:'plancero',   emoji:'🔧', nombre:'Plan cero fuga' },
  { id:'manguera',   emoji:'🛠️', nombre:'Revisión de manguera' },
  { id:'purga',      emoji:'💨', nombre:'Purga con pig' },
  { id:'tendido',    emoji:'🧵', nombre:'Tendido de manguera' },
  { id:'flushing',   emoji:'🔩', nombre:'Instalación de flushing' },
  { id:'caudal',     emoji:'💧', nombre:'Medición de caudal' },
];

function baseFields(){
  return `
    <div class="form-card">
      <div class="section-title">📍 Ubicación</div>
      <div class="form-grid">
        <div class="form-field"><label>Fundo</label>
          <select id="f-fundo">
            <option value="">— Seleccionar —</option>
            <option>Lobo 1</option><option>Lobo 2</option><option>Huaca</option>
          </select>
        </div>
        <div class="form-field"><label>Lote / Sector</label>
          <input type="text" id="f-lote" placeholder="Ej. EQ10-TR04"/>
        </div>
        <div class="form-field full"><label>Fecha</label>
          <input type="date" id="f-fecha" value="${new Date().toISOString().slice(0,10)}"/>
        </div>
      </div>
    </div>`;
}

function jornalesField(){
  return `
    <div class="form-card">
      <div class="section-title">👷 Mano de obra y avance</div>
      <div class="form-grid">
        <div class="form-field"><label>Jornales (N°)</label>
          <input type="number" id="f-jornales" step="0.5" min="0" placeholder="0.0"/>
        </div>
        <div class="form-field"><label>Avance (ha)</label>
          <input type="number" id="f-avance-ha" step="0.01" min="0" placeholder="0.00"/>
        </div>
      </div>
    </div>`;
}

function obsField(placeholder){
  return `
    <div class="form-card">
      <div class="form-field full"><label>Observaciones</label>
        <textarea id="f-obs" placeholder="${placeholder||'Notas adicionales...'}"></textarea>
      </div>
    </div>`;
}

const FORMULARIOS = {
  aplicacion: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">🧪 Insumo y dosis</div>
      <div class="form-grid">
        <div class="form-field full"><label>Insumo</label><input type="text" id="f-insumo" placeholder="Ej. Ácido fúlvico"/></div>
        <div class="form-field"><label>Dosis cantidad</label><input type="number" id="f-dosis-cant" step="0.01" min="0"/></div>
        <div class="form-field"><label>Unidad</label>
          <select id="f-dosis-unid"><option>L</option><option>Kg</option><option>g</option><option>ml</option></select>
        </div>
        <div class="form-field full"><label>Método de aplicación</label>
          <select id="f-metodo"><option value="">— Seleccionar —</option><option>Válvula</option><option>Fertirriego</option><option>Foliar</option></select>
        </div>
        <div class="form-field full"><label>Operador</label><input type="text" id="f-operador" placeholder="Nombre del operador"/></div>
      </div>
    </div>` + jornalesField() + obsField(),

  limpieza: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">📏 Detalle de limpieza</div>
      <div class="form-grid">
        <div class="form-field"><label>IMOF promedio (ml)</label><input type="number" id="f-imof" step="0.01" min="0"/></div>
        <div class="form-field"><label>Frecuencia (días)</label><input type="number" id="f-frecuencia" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras que no riegan</label><input type="number" id="f-mang-no-riegan" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras reparadas</label><input type="number" id="f-mang-rep" step="1" min="0"/></div>
        <div class="form-field full"><label>Mangueras pendientes</label><input type="number" id="f-mang-pend" step="1" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField(),

  plancero: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">🔍 Detalle de inspección</div>
      <div class="form-grid">
        <div class="form-field"><label>Fugas encontradas</label><input type="number" id="f-fugas" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras reparadas</label><input type="number" id="f-mang-rep" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras pendientes</label><input type="number" id="f-mang-pend" step="1" min="0"/></div>
        <div class="form-field"><label>Hectáreas pendientes</label><input type="number" id="f-ha-pend" step="0.01" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField('Describe el estado encontrado...'),

  manguera: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">🛠️ Detalle de revisión</div>
      <div class="form-grid">
        <div class="form-field"><label>Mangueras revisadas</label><input type="number" id="f-mang-rev" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras reparadas</label><input type="number" id="f-mang-rep" step="1" min="0"/></div>
        <div class="form-field"><label>Mangueras pendientes</label><input type="number" id="f-mang-pend" step="1" min="0"/></div>
        <div class="form-field"><label>Hectáreas pendientes</label><input type="number" id="f-ha-pend" step="0.01" min="0"/></div>
        <div class="form-field full"><label>Estado general</label>
          <select id="f-estado"><option value="">— Estado —</option><option>Bueno</option><option>Regular</option><option>Malo</option></select>
        </div>
      </div>
    </div>` + jornalesField() + obsField(),

  purga: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">💨 Detalle de purga con pig</div>
      <div class="form-grid">
        <div class="form-field"><label>Mangueras purgadas</label><input type="number" id="f-mang-purgadas" step="1" min="0"/></div>
        <div class="form-field"><label>Pigs utilizados</label><input type="number" id="f-pigs" step="1" min="0"/></div>
        <div class="form-field full"><label>Presión de purga (M.C.A)</label><input type="number" id="f-presion-purga" step="0.1" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField('Condiciones de la purga...'),

  tendido: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">🧵 Detalle de tendido</div>
      <div class="form-grid">
        <div class="form-field"><label>Metros tendidos</label><input type="number" id="f-metros" step="0.1" min="0"/></div>
        <div class="form-field"><label>N° de mangueras tendidas</label><input type="number" id="f-mang-tendidas" step="1" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField('Condiciones del tendido...'),

  flushing: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">🔩 Detalle de instalación</div>
      <div class="form-grid">
        <div class="form-field"><label>N° de flushing utilizados</label><input type="number" id="f-flushing-util" step="1" min="0"/></div>
        <div class="form-field"><label>Flushing pendientes por colocar</label><input type="number" id="f-flushing-pend" step="1" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField('Notas de instalación...'),

  caudal: () => baseFields() + `
    <div class="form-card">
      <div class="section-title">💧 Datos de medición</div>
      <div class="form-grid">
        <div class="form-field full"><label>N° de mangueras evaluadas</label><input type="number" id="f-mang-eval" step="1" min="0"/></div>
        <div class="form-field"><label>Caudal medido promedio (L/min)</label><input type="number" id="f-caudal" step="0.01" min="0"/></div>
        <div class="form-field"><label>Caudal nominal (L/min)</label><input type="number" id="f-caudal-nom" step="0.01" min="0" placeholder="7.10"/></div>
        <div class="form-field full"><label>Presión de operación (M.C.A)</label><input type="number" id="f-presion" step="0.1" min="0"/></div>
      </div>
    </div>` + jornalesField() + obsField('Condiciones de medición...'),
};

// Mapea cada labor a la lista de IDs de campos "extra" que debe leer al guardar
const CAMPOS_EXTRA = {
  aplicacion: ['f-insumo','f-dosis-cant','f-dosis-unid','f-metodo','f-operador'],
  limpieza:   ['f-imof','f-frecuencia','f-mang-no-riegan','f-mang-rep','f-mang-pend'],
  plancero:   ['f-fugas','f-mang-rep','f-mang-pend','f-ha-pend'],
  manguera:   ['f-mang-rev','f-mang-rep','f-mang-pend','f-ha-pend','f-estado'],
  purga:      ['f-mang-purgadas','f-pigs','f-presion-purga'],
  tendido:    ['f-metros','f-mang-tendidas'],
  flushing:   ['f-flushing-util','f-flushing-pend'],
  caudal:     ['f-mang-eval','f-caudal','f-caudal-nom','f-presion'],
};

// ============================================================
// ESTADO Y LOGIN
// ============================================================
let currentUser = JSON.parse(localStorage.getItem('rc_user') || 'null');
let pinBuffer = '';
let controladoresCache = [];

function val(id){ const el = document.getElementById(id); return el ? el.value : null; }
function num(id){ const v = val(id); return (v===null || v==='') ? null : parseFloat(v); }

function showToast(msg, tipo){
  const t = document.createElement('div');
  t.className = 'toast' + (tipo==='error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

async function cargarControladores(){
  const sel = document.getElementById('login-controlador');
  try{
    const { data, error } = await sb.from('controladores').select('*').eq('activo', true).order('nombre');
    if (error) throw error;
    controladoresCache = data || [];
    sel.innerHTML = '<option value="">— Selecciona tu nombre —</option>' +
      controladoresCache.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
  }catch(err){
    sel.innerHTML = '<option value="">Error al cargar — revisa conexión</option>';
    showToast('No se pudo conectar a la base de datos', 'error');
  }
}

function renderKeypad(){
  const kp = document.getElementById('keypad');
  const teclas = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  kp.innerHTML = teclas.map(t => `<button onclick="tocarTecla('${t}')">${t}</button>`).join('');
}

function tocarTecla(t){
  if (t === '⌫'){ pinBuffer = pinBuffer.slice(0,-1); }
  else if (t === '✓'){ intentarLogin(); return; }
  else if (pinBuffer.length < 4){ pinBuffer += t; }
  pintarPinDots();
}

function pintarPinDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.classList.toggle('filled', i < pinBuffer.length);
  });
}

async function intentarLogin(){
  const controladorId = val('login-controlador');
  if (!controladorId){ showToast('Selecciona tu nombre', 'error'); return; }
  if (pinBuffer.length !== 4){ showToast('Ingresa tu PIN de 4 dígitos', 'error'); return; }
  const c = controladoresCache.find(x => x.id === controladorId);
  if (!c || c.pin !== pinBuffer){
    showToast('PIN incorrecto', 'error');
    pinBuffer = ''; pintarPinDots();
    return;
  }
  currentUser = { id:c.id, nombre:c.nombre };
  localStorage.setItem('rc_user', JSON.stringify(currentUser));
  entrarApp();
}

function cerrarSesion(){
  currentUser = null;
  localStorage.removeItem('rc_user');
  pinBuffer = '';
  document.getElementById('app-main').classList.add('hidden');
  document.getElementById('bottom-nav').classList.add('hidden');
  document.getElementById('user-pill').classList.add('hidden');
  document.getElementById('view-login').classList.remove('hidden');
  cargarControladores();
}

function entrarApp(){
  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('app-main').classList.remove('hidden');
  document.getElementById('bottom-nav').classList.remove('hidden');
  document.getElementById('user-pill').classList.remove('hidden');
  document.getElementById('user-pill-name').textContent = currentUser.nombre;
  irHome();
}

// ============================================================
// NAVEGACIÓN
// ============================================================
function renderLaborGrid(){
  const grid = document.getElementById('labor-grid');
  grid.innerHTML = LABORES.map(l => `
    <div class="labor-card" onclick="abrirFormulario('${l.id}')">
      <span class="emoji">${l.emoji}</span>
      <div class="lc-name">${l.nombre}</div>
    </div>`).join('');
}

function irHome(){
  document.getElementById('view-home').classList.remove('hidden');
  document.getElementById('view-form').classList.add('hidden');
  document.getElementById('view-lista').classList.add('hidden');
  document.getElementById('nav-home').classList.add('active');
  document.getElementById('nav-lista').classList.remove('active');
}

function irLista(){
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-form').classList.add('hidden');
  document.getElementById('view-lista').classList.remove('hidden');
  document.getElementById('nav-home').classList.remove('active');
  document.getElementById('nav-lista').classList.add('active');
  cargarLista();
}

function volverHome(){ irHome(); }

let laborActual = null;

function abrirFormulario(laborId){
  laborActual = laborId;
  const labor = LABORES.find(l => l.id === laborId);
  document.getElementById('form-title').textContent = `${labor.emoji} ${labor.nombre}`;
  document.getElementById('form-container').innerHTML = FORMULARIOS[laborId]();
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-form').classList.remove('hidden');
}

// ============================================================
// GUARDAR
// ============================================================
async function guardarLabor(){
  if (!laborActual) return;
  const fundo = val('f-fundo');
  if (!fundo){ showToast('Selecciona un fundo', 'error'); return; }

  const datosExtra = {};
  (CAMPOS_EXTRA[laborActual] || []).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = id.replace('f-','').replace(/-/g,'_');
    datosExtra[key] = el.type === 'number' ? num(id) : val(id);
  });

  const registro = {
    fecha: val('f-fecha'),
    controlador: currentUser.nombre,
    labor_tipo: laborActual,
    fundo: fundo,
    lote: val('f-lote'),
    jornales: num('f-jornales'),
    avance_ha: num('f-avance-ha'),
    observaciones: val('f-obs'),
    datos_extra: datosExtra,
  };

  try{
    const { error } = await sb.from('labores').insert(registro);
    if (error) throw error;
    showToast('✅ Registro guardado');
    irHome();
  }catch(err){
    showToast('Error al guardar: revisa tu conexión', 'error');
  }
}

// ============================================================
// LISTA
// ============================================================
let filtroActual = 'hoy';

function cambiarFiltro(f){
  filtroActual = f;
  ['hoy','semana','todos'].forEach(x => document.getElementById('tab-'+x).classList.toggle('active', x===f));
  cargarLista();
}

async function cargarLista(){
  const cont = document.getElementById('lista-registros');
  cont.innerHTML = '<div class="empty-state">Cargando...</div>';

  let query = sb.from('labores').select('*').eq('controlador', currentUser.nombre).order('created_at', { ascending:false });

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  if (filtroActual === 'hoy'){
    query = query.eq('fecha', hoy.toISOString().slice(0,10));
  } else if (filtroActual === 'semana'){
    const inicio = new Date(hoy); inicio.setDate(inicio.getDate() - 7);
    query = query.gte('fecha', inicio.toISOString().slice(0,10));
  }

  try{
    const { data, error } = await query.limit(100);
    if (error) throw error;
    if (!data || data.length === 0){
      cont.innerHTML = '<div class="empty-state">No hay registros en este periodo</div>';
      return;
    }
    cont.innerHTML = data.map(r => {
      const labor = LABORES.find(l => l.id === r.labor_tipo);
      return `
        <div class="record-card">
          <div class="rc-top">
            <span class="rc-labor">${labor ? labor.emoji+' '+labor.nombre : r.labor_tipo}</span>
            <span class="rc-fecha">${r.fecha}</span>
          </div>
          <div class="rc-meta">${r.fundo || '—'} · ${r.lote || 'Sin lote'} ${r.avance_ha ? '· '+r.avance_ha+' ha' : ''}</div>
        </div>`;
    }).join('');
  }catch(err){
    cont.innerHTML = '<div class="empty-state">Error al cargar registros</div>';
  }
}

renderKeypad();
renderLaborGrid();
cargarControladores();
if (currentUser){ entrarApp(); }

  window.addEventListener('load', () => {

  });
